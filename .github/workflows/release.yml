# DH1 §6 — release pipeline for the GeneGraph Import Helper.
#
# Triggers:
#   - Tag push matching `v*.*.*` (e.g., v1.0.0, v1.0.0-rc.1).
#     Standard semver; matches electron-builder's default
#     `${version}` substitution.
#   - Manual `workflow_dispatch` for re-running a release without
#     re-tagging (useful when a tag's CI run fails on a transient
#     error and we want to retry without bumping the version).
#
# Builds for macOS (universal arm64 + x64) and Windows (x64). Skips
# Linux at launch — AppImage / deb work locally if a developer
# needs them; the release pipeline stays mac+win for v1.0.
#
# Signing + notarization secrets:
#   macOS:
#     MAC_CSC_LINK             — base64 of the Apple .p12 export
#     MAC_CSC_KEY_PASSWORD     — .p12 password
#     APPLE_API_KEY_ID         — App Store Connect API key id
#     APPLE_API_KEY_ISSUER_ID  — issuer team UUID
#     APPLE_API_KEY            — base64 of the .p8 private key
#                                (decoded to a temp file at runtime
#                                because notarytool needs a path)
#   Windows:
#     WIN_CSC_LINK             — base64 of the Authenticode .pfx
#     WIN_CSC_KEY_PASSWORD     — .pfx password
#   Publish:
#     GH_TOKEN                 — PAT with `repo` scope; lets
#                                electron-builder upload assets to
#                                this repo's GitHub Releases.
#
# When secrets are absent (dev / first-bootstrap run) the workflow
# still produces unsigned local artifacts and the workflow does
# NOT fail. The notarize hook short-circuits on missing
# APPLE_API_KEY_ID; electron-builder skips signing when CSC vars
# are unset. The build is then non-shipping but the workflow has
# proven itself end-to-end before secrets land.
name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Tag-triggered runs check out the tag automatically;
          # workflow_dispatch needs an explicit ref to land on the
          # right commit.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      # macOS-only: write the App Store Connect API key (.p8) to a
      # temp file so notarytool can read it as a path. The API key
      # is stored in Actions as base64 because GitHub secrets are
      # opaque strings; .p8 contains binary bytes that don't
      # survive round-tripping through the secret-store as plain
      # text.
      #
      # Step-level `if:` can't reference `secrets.X` directly —
      # GitHub Actions blocks the secrets context outside of
      # `env:` mappings as a security policy. So the empty-check
      # lives inside the bash script where the env var IS
      # available. When APPLE_API_KEY is unset (validation /
      # bootstrap runs), the step exits 0 cleanly without
      # writing the .p8 — notarize.js then short-circuits on
      # the also-missing APPLE_API_KEY_ID.
      - name: Decode Apple API key (.p8) — macOS only
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "$APPLE_API_KEY_B64" ]; then
            echo "APPLE_API_KEY secret absent — skipping .p8 decode"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/apple"
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/apple/api-key.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple/api-key.p8" >> "$GITHUB_ENV"

      # Conditional publish — when GH_TOKEN is present, upload
      # artifacts to GitHub Releases; when absent (validation /
      # bootstrap runs before Hafiz adds the secret), build only.
      # The DH1 spec requires the workflow to succeed end-to-end
      # without secrets so the pipeline is provably correct
      # before the first signed release goes out.
      #
      # `shell: bash` works on both macOS and Windows runners
      # (Git Bash is preinstalled on windows-latest).
      - name: Build + publish
        shell: bash
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo "GH_TOKEN present — running with --publish always"
            npm run dist -- --publish always
          else
            echo "GH_TOKEN absent — building unsigned/un-published artifacts only"
            npm run dist -- --publish never
          fi
        env:
          # GitHub release publishing
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # macOS code signing
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # macOS notarization (notarize.js reads these env vars)
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          # Windows code signing — electron-builder picks these up
          # automatically when CSC_LINK / CSC_KEY_PASSWORD aren't
          # set (which they aren't on the Windows runner because
          # those vars target macOS in this matrix).
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
